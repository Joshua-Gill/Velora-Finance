<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login Verification</title>
</head>
<body class="auth-page">
    <h1 class="auth-hero-heading">Welcome  to Velora</h1>
    
    <div class="auth-container">
        <h1 style="font-size: 26px; font-weight: 700; text-align: center; color:  #e2e8f0" >Log in to your Account</h1>
       <div class="auth-content">
        <input type="email"  class="input" id="email" placeholder="Enter your account email">
       <input type="password" class="input" id="password" placeholder="Enter your password">
       <button id="auth-button" onclick="login()">Login</button>
       <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
     </div>
    </div>
    
    <script src="script.js"></script>
    <script src="Authentication.js"></script>
    
</body>
</html>
