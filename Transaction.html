<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Transactions</title>
    <link rel="icon" href="logo.png?v=2">
</head>
<body>
    <div class="container">
         <div class="nav">
        <div class="heading-box">
            <h2 class="Trans-main-heading Glowing-Velora-Color">Transaction History</h2>
           
        </div>

  <div class="icons-sidebox">
           <div class="bell-wrapper">
               <i class="fa-solid fa-bell bell-icon"></i>
               <span class="notification-badge"></span>
             </div>
             <a href="Settings.html"><i class="fa-solid fa-gear gear-icon"></i></a>
            
    <div class="dashboard-email glass ">
            <p id="welcome-user">  <i style="color: #e2e8f0;" class="fa-solid fa-angle-down"></i></p>
        
        <div class="dropdown-menu" id="dropdown">
          <p id="account-email"></p>
          <button id="signout-btn" onclick="signout()">Sign Out</button>
          <button id="switch-account-btn" onmouseover="switchAccount()">Switch Account</button>
        </div>
     </div>
   </div>
        
    </div>
        <div class="main-content ">
   <div class="sidebar glass">

            <div class="img">
                <img class="logo" src="logo.png" alt="logo-img">
                <h3 class="logo-heading Glowing-Velora-Color">Velora</h3>
            </div>

            <ul class="nav-links">
                <li><i class="fa-solid fa-users"></i><a href="index.html">Dashboard</a></li>
                <li><i class="fa-solid fa-credit-card"></i><a href="Transaction.html">Transactions</a></li>
                <li><i class="fa-solid fa-wallet"></i><a href="Budgets.html">Budgets</a></li>
                <li><i class="fa-solid fa-chart-line"></i><a href="Analytics.html">Analytics</a></li>
                <li><i class="fa-solid fa-bullseye"></i><a href="Goals.html">Goals</a></li>
                 <li><i class="fa-solid fa-gear"></i><a href="Settings.html">Settings</a></li>
            </ul>

             <button class="dark-mode-toggle" onclick="toggleTheme()">🌙 Light Mode</button>

        </div>
  <div class="trasactions-container">
      <div class="transaction-filters">
        <button  class="filter" onclick="filterTransactions('all')"  >ALL</button>
        <button  class="filter" onclick="filterTransactions('today')">Today</button>
        <button  class="filter" onclick="filterTransactions('week')">This Week</button>
        <button  class="filter" onclick="filterTransactions('month')">This Month</button>
        <button  class="filter" onclick="filterTransactions('year')">This Year</button>
    </div>
 <!-- SUMMARY BAR -->
  <div class="transaction-card">
    <div class="transaction-summary">

        <div class="summary-box">
            <p>Total Income</p>
            <h2 class="Summary-income"></h2>
        </div>

        <div class="divider"></div>

        <div class="summary-box">
            <p>Total Expense</p>
            <h2 class="Summary-expense"></h2>
        </div>

        <div class="divider"></div>

        <div class="summary-box">
            <p>Total Balance</p>
            <h2 class="Summary-balance"></h2>
        </div>

    </div>


    <!-- TRANSACTION CARD -->
    <div class="transactions-card">

        <!-- HEADER -->
        <div class="transactions-header">
            <div>Date</div>
            <div>Description</div>
            <div>Type</div>
            <div>Amount</div>
            <div>Action</div>
        </div>


        <!-- TRANSACTION LIST -->
        <div class="transaction-list">
       </div>
        </div>
    </div>
    </div>
    </div>
    </div>
  <!-- Notification Drpodown -->
 <div class="notification-container glass">
    
 </div>
    <div class="switch-modal" id="switch-modal">

  <div class="Modal-Content">
    <h3 style="color:white">Switch Account</h3>
    <div id="account-list"></div>
    <button onclick="addAccount()">+ Add Account</button>
  </div>
</div>
    <script src="Authentication.js"></script>
    <script src="setting.js"></script>
    <script src="transactions.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
