<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Signup Verification</title>
</head>

<body class="auth-page">
    <h1 class="auth-hero-heading">Take control of your finances</h1>
    
    <div class="auth-container">
        <h1 style="font-size: 26px; font-weight: 700; text-align: center; color:  #e2e8f0" >Create Account</h1>
       <div class="auth-content">
        <input type="email"  class="input" id="email" placeholder="Enter email">
       <input type="password" class="input" id="password" placeholder="Enter password">
       <button id="auth-button" onclick="signup()">Sign Up</button>
       <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
     </div>
    </div>
    <script src="script.js"></script>
    <script src="Authentication.js"></script>
</body>
</html>
